name: a11y & build

# Accessibility is existential (§2). This gate runs on every push/PR. A red
# check here blocks merge. Remember: green here means "no automated violations",
# not "accessible" — manual AT testing is still required (§5).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build + run axe-core accessibility tests
        run: npm run test:a11y

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
